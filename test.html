<!DOCTYPE html>
<html>
<head>
    <title>Task Creation Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #6a0dad, #9b59b6);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            width: 400px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .card h2 {
            text-align: center;
            color: #6a0dad;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: 600;
            font-size: 14px;
            color: #444;
            display: block;
            margin-bottom: 5px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            outline: none;
            transition: 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #9b59b6;
            box-shadow: 0 0 0 2px rgba(155, 89, 182, 0.2);
        }

        textarea {
            resize: none;
            height: 80px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #6a0dad;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #5a009d;
        }

        #statusText {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Create Task</h2>

        <div class="form-group">
            <label>Task Name</label>
            <input type="text" id="taskName" placeholder="Enter task name">
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea id="description" placeholder="Enter task description"></textarea>
        </div>

        <div class="form-group">
            <label>Priority</label>
            <select id="priority">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>
        </div>

        <div class="form-group">
            <label>User</label>
            <input type="text" id="user" placeholder="Enter user name">
        </div>

        <button onclick="sendTestTask()">Submit Task</button>

        <p id="statusText"></p>
    </div>

    <script>
        function sendTestTask() {
            const statusText = document.getElementById("statusText");
            statusText.innerText = "Sending... Please wait.";
            statusText.style.color = "#6a0dad";

            const webAppUrl = "https://script.google.com/macros/s/AKfycbw9zl_ZiKxdBXVmlI57zxcY3jSWOTf4MKqppb3i_LERd2EAMi3XU2xPt-Rgorz4G5f5/exec";

            const taskData = {
                taskName: document.getElementById("taskName").value,
                description: document.getElementById("description").value,
                priority: document.getElementById("priority").value,
                user: document.getElementById("user").value
            };

            fetch(webAppUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8'
                },
                body: JSON.stringify(taskData)
            })
            .then(response => {
                statusText.innerText = "✅ Task successfully sent!";
                statusText.style.color = "green";

                // Clear form
                document.getElementById("taskName").value = "";
                document.getElementById("description").value = "";
                document.getElementById("priority").value = "Low";
                document.getElementById("user").value = "";
            })
            .catch(err => {
                statusText.innerText = "❌ Error: " + err.message;
                statusText.style.color = "red";
            });
        }
    </script>

</body>
</html>
