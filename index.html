<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Creation System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #6a0dad, #9b59b6);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            width: 400px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .card h2 {
            text-align: center;
            color: #6a0dad;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: 600;
            font-size: 14px;
            color: #444;
            display: block;
            margin-bottom: 5px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            outline: none;
            transition: 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #9b59b6;
            box-shadow: 0 0 0 2px rgba(155, 89, 182, 0.2);
        }

        textarea {
            resize: none;
            height: 80px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #6a0dad;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover:not(:disabled) {
            background-color: #5a009d;
        }

        button:disabled {
            background-color: #bfa6d8;
            cursor: not-allowed;
        }

        #statusText {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
            min-height: 20px; /* Prevents layout shift when text appears */
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Create Task</h2>

        <div class="form-group">
            <label for="taskName">Task Name</label>
            <input type="text" id="taskName" placeholder="Enter task name" required>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" placeholder="Enter task description" required></textarea>
        </div>

        <div class="form-group">
            <label for="priority">Priority</label>
            <select id="priority">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>
        </div>

        <div class="form-group">
            <label for="assignedTo">Assigned To</label>
            <select id="assignedTo">
                <option value="Marketing Team">Marketing Team</option>
                <option value="Creatives Team">Creatives Team</option>
                <option value="Development Team">Development Team</option>
                <option value="Operations Team">Operations Team</option>
                <option value="Everyone">Everyone</option>
            </select>
        </div>

        <div class="form-group">
            <label for="user">Created By (User)</label>
            <input type="text" id="user" placeholder="Enter your name" required>
        </div>

        <button id="submitBtn" onclick="sendTestTask()">Submit Task</button>

        <p id="statusText"></p>
    </div>

    <script>
        async function sendTestTask() {
            // 1. Grab DOM elements
            const submitBtn = document.getElementById("submitBtn");
            const statusText = document.getElementById("statusText");
            
            // 2. IMPORTANT: Replace this with your newly deployed Google Apps Script Web App URL
            const webAppUrl = "https://script.google.com/macros/s/AKfycbyn60jnSluxnqetpUG4kjex-rI9P1hsfBKEKth6CVdjHMxXCC7EpkCMyX8hrdLTW9vIrQ/exec"; 

            // 3. Basic Validation
            const taskName = document.getElementById("taskName").value.trim();
            const user = document.getElementById("user").value.trim();
            
            if (!taskName || !user) {
                statusText.innerText = "⚠️ Please fill in the Task Name and User.";
                statusText.style.color = "orange";
                return;
            }

            // 4. Update UI to loading state
            submitBtn.disabled = true;
            submitBtn.innerText = "Sending...";
            statusText.innerText = "Sending... Please wait.";
            statusText.style.color = "#6a0dad";

            // 5. Construct Payload
            const taskData = {
                taskName: taskName,
                description: document.getElementById("description").value.trim(),
                priority: document.getElementById("priority").value,
                assignedTo: document.getElementById("assignedTo").value,
                user: user
            };

            // 6. Send to Backend
            try {
                const response = await fetch(webAppUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8' // Required for Google Apps Script CORS
                    },
                    body: JSON.stringify(taskData)
                });

                if (response.ok) {
                    statusText.innerText = "✅ Task successfully sent to Discord!";
                    statusText.style.color = "green";

                    // Reset form fields
                    document.getElementById("taskName").value = "";
                    document.getElementById("description").value = "";
                    document.getElementById("priority").value = "Low";
                    document.getElementById("assignedTo").value = "Marketing Team";
                    document.getElementById("user").value = "";
                } else {
                    throw new Error("Server responded with an error.");
                }
            } catch (err) {
                statusText.innerText = "❌ Error: " + err.message;
                statusText.style.color = "red";
            } finally {
                // Restore button state
                submitBtn.disabled = false;
                submitBtn.innerText = "Submit Task";
                
                // Clear status message after 5 seconds
                setTimeout(() => {
                    statusText.innerText = "";
                }, 5000);
            }
        }
    </script>

</body>
</html>
